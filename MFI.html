<h2>Contact MFI</h2>

<div class="card">
  <p>
    For enquiries about briefings, presentations, advisory work, or macro-financial analysis, please use the form below.
  </p>

  <form action="https://formspree.io/f/mykqopkl" method="POST" class="contact-form">
    <input type="hidden" name="_subject" value="New MFI enquiry">

    <label for="name">Name</label>
    <input type="text" id="name" name="name" required>

    <label for="email">Email</label>
    <input type="email" id="email" name="email" required>

    <label for="subject">Subject</label>
    <input type="text" id="subject" name="subject">

    <label for="message">Message</label>
    <textarea id="message" name="message" rows="6" required></textarea>

    <button type="submit" class="button">Send message</button>
  </form>
</div>
